<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>EGC 2026 — Staff Check-in</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surface:#0f1623;--card:#141d2e;--border:#1e2d47;
  --gold:#f0b429;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#2d7ef7;
  --text:#e2e8f0;--muted:#64748b;
  --mono:'Space Mono',monospace;--sans:'Noto Sans Thai',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(45,126,247,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(45,126,247,.04) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* Header */
header{padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(8,12,20,.95);
  backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 10px var(--gold);animation:pulse-gold 2s infinite;flex-shrink:0}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 6px var(--gold)}50%{box-shadow:0 0 18px var(--gold)}}
.header-title{font-family:var(--mono);font-size:12px;color:var(--gold);letter-spacing:1px}
.header-sub{font-size:10px;color:var(--muted);margin-top:1px}
.live-badge{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);font-size:10px;color:var(--green);font-family:var(--mono)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Mode Selector */
.mode-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 12px;
  background:var(--surface);border-bottom:1px solid var(--border)}
.mode-btn{padding:8px 6px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);color:var(--muted);font-size:11px;font-family:var(--mono);
  cursor:pointer;text-align:center;transition:all .2s;line-height:1.4}
.mode-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(240,180,41,.08)}
.mode-btn.ws1.active{border-color:var(--blue);color:var(--blue);background:rgba(45,126,247,.08)}
.mode-btn.ws2.active{border-color:#a855f7;color:#a855f7;background:rgba(168,85,247,.08)}
.mode-label{font-size:14px;margin-bottom:2px}

/* Stats */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat-item{background:var(--surface);padding:10px 12px;text-align:center}
.stat-num{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--gold)}
.stat-label{font-size:9px;color:var(--muted);margin-top:1px;letter-spacing:.5px}

/* Tabs */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.tab{flex:1;padding:11px;text-align:center;cursor:pointer;font-size:12px;color:var(--muted);
  border-bottom:2px solid transparent;transition:all .2s;font-family:var(--mono)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-panel{flex:1;display:none;flex-direction:column;overflow-y:auto}
.tab-panel.active{display:flex}

/* Scanner */
#panel-scan{align-items:center;padding:16px 14px;gap:12px;position:relative}
.scanner-wrap{position:relative;width:100%;max-width:360px;border-radius:14px;overflow:hidden;border:2px solid var(--border)}
#scanner-video{width:100%;display:block;background:#000;min-height:240px;object-fit:cover}
#scanner-canvas{display:none}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{width:180px;height:180px;position:relative}
.scan-frame::before,.scan-frame::after,.scan-frame span::before,.scan-frame span::after{
  content:'';position:absolute;width:24px;height:24px;border-color:var(--gold);border-style:solid}
.scan-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-frame::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.scan-frame span::before{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.scan-frame span::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-line{position:absolute;left:8%;right:8%;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  animation:scan-move 2s linear infinite;box-shadow:0 0 8px var(--gold)}
@keyframes scan-move{0%{top:12%}100%{top:88%}}

/* Result Overlay */
.result-overlay{
  position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(8,12,20,.88);backdrop-filter:blur(4px);z-index:10;border-radius:12px;
  padding:16px;animation:fade-in .2s ease;
}
.result-overlay.show{display:flex}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.result-inner{text-align:center;padding:20px;width:100%}
.result-icon{font-size:52px;margin-bottom:8px;display:block}
.result-status-text{font-family:var(--mono);font-size:14px;font-weight:700;margin-bottom:8px}
.res-success .result-status-text{color:var(--green)}
.res-duplicate .result-status-text{color:var(--amber)}
.res-error .result-status-text,.res-denied .result-status-text{color:var(--red)}
.result-name-text{font-size:17px;font-weight:700;color:var(--text);margin-bottom:2px}
.result-meta-text{font-size:12px;color:var(--muted);margin-bottom:6px}
.result-ticket-text{display:inline-block;padding:4px 12px;border-radius:20px;font-family:var(--mono);
  font-size:12px;font-weight:700;background:rgba(240,180,41,.12);color:var(--gold);
  border:1px solid rgba(240,180,41,.3);letter-spacing:1px}
.result-time-text{font-size:10px;color:var(--muted);margin-top:6px}
.scanner-hint{font-size:11px;color:var(--muted);font-family:var(--mono);text-align:center}

.btn{display:block;width:100%;max-width:360px;padding:13px;background:var(--gold);color:#080c14;
  border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:var(--sans);
  cursor:pointer;transition:all .2s}
.btn:hover{background:#f5c842}

/* Manual */
#panel-manual{padding:16px 14px;gap:12px}
.manual-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.manual-title{font-family:var(--mono);font-size:12px;color:var(--gold);margin-bottom:12px}
label{display:block;font-size:10px;color:var(--muted);margin-bottom:5px;letter-spacing:.5px}
.input-row{display:flex;gap:8px}
input[type=text]{flex:1;padding:11px 12px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;transition:border .2s}
input:focus{border-color:var(--gold)}
.btn-ci{padding:11px 16px;background:var(--gold);color:#080c14;border:none;border-radius:8px;
  font-weight:700;cursor:pointer;font-family:var(--mono);font-size:12px;white-space:nowrap}
.manual-result{border-radius:12px;padding:16px;border:1px solid;animation:slide-up .3s ease;margin-top:4px}
@keyframes slide-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.manual-result.success{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3)}
.manual-result.duplicate{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3)}
.manual-result.error,.manual-result.denied{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3)}
.mr-icon{font-size:32px;margin-bottom:8px}
.mr-status{font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:8px}
.manual-result.success .mr-status{color:var(--green)}
.manual-result.duplicate .mr-status{color:var(--amber)}
.manual-result.error .mr-status,.manual-result.denied .mr-status{color:var(--red)}
.mr-name{font-size:17px;font-weight:700;margin-bottom:3px}
.mr-meta{font-size:12px;color:var(--muted)}
.mr-ticket{display:inline-block;padding:4px 12px;border-radius:20px;font-family:var(--mono);
  font-size:12px;font-weight:700;background:rgba(240,180,41,.12);color:var(--gold);
  border:1px solid rgba(240,180,41,.3);margin:6px 0;letter-spacing:1px}
.mr-time{font-size:10px;color:var(--muted);margin-top:4px}

/* Log */
#panel-log{padding:12px;gap:6px}
.log-item{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;display:flex;align-items:center;gap:10px}
.log-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.log-dot.success{background:var(--green);box-shadow:0 0 6px var(--green)}
.log-dot.duplicate{background:var(--amber)}
.log-dot.error,.log-dot.denied{background:var(--red)}
.log-info{flex:1;min-width:0}
.log-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-sub{font-family:var(--mono);font-size:10px;color:var(--gold)}
.log-time{font-size:10px;color:var(--muted);flex-shrink:0;font-family:var(--mono)}
.log-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}
.spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--border);
  border-top-color:var(--gold);animation:spin .7s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo-dot"></div>
    <div>
      <div class="header-title">EGC 2026 · STAFF</div>
      <div class="header-sub" id="mode-header">Check-in System</div>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</header>

<!-- Mode Selector -->
<div class="mode-bar">
  <div class="mode-btn active" id="mode-main" onclick="setMode('main')">
    <div class="mode-label">🎫</div>เข้างานหลัก
  </div>
  <div class="mode-btn ws1" id="mode-ws1" onclick="setMode('ws1')">
    <div class="mode-label">🎤</div>Workshop 1<br><span style="font-size:9px">ภาคเช้า</span>
  </div>
  <div class="mode-btn ws2" id="mode-ws2" onclick="setMode('ws2')">
    <div class="mode-label">🤖</div>Workshop 2<br><span style="font-size:9px">ภาคบ่าย</span>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-num" id="stat-main">0</div><div class="stat-label">เข้างานหลัก</div></div>
  <div class="stat-item"><div class="stat-num" id="stat-ws1">0</div><div class="stat-label">WS ภาคเช้า</div></div>
  <div class="stat-item"><div class="stat-num" id="stat-ws2">0</div><div class="stat-label">WS ภาคบ่าย</div></div>
</div>

<!-- Tabs -->
<div class="tab-bar">
  <div class="tab active" onclick="switchTab('scan')" id="tab-scan">📷 สแกน</div>
  <div class="tab" onclick="switchTab('manual')" id="tab-manual">⌨️ Manual</div>
  <div class="tab" onclick="switchTab('log')" id="tab-log">📋 Log</div>
</div>

<!-- Scanner Panel -->
<div class="tab-panel active" id="panel-scan">
  <div class="scanner-wrap" id="scanner-wrap">
    <video id="scanner-video" autoplay muted playsinline></video>
    <canvas id="scanner-canvas"></canvas>
    <div class="scan-overlay"><div class="scan-frame"><span></span><div class="scan-line"></div></div></div>

    <!-- Result Overlay (แสดงผลทับกล้อง) -->
    <div class="result-overlay" id="result-overlay" onclick="dismissResult()">
      <div class="result-inner" id="result-inner"></div>
    </div>
  </div>
  <div class="scanner-hint" id="scanner-hint">กด "เปิดกล้อง" เพื่อเริ่มสแกน</div>
  <button class="btn" id="btn-camera" onclick="toggleCamera()">📷 เปิดกล้อง</button>
</div>

<!-- Manual Panel -->
<div class="tab-panel" id="panel-manual">
  <div class="manual-card">
    <div class="manual-title">// กรอก Ticket ID</div>
    <label>TICKET ID</label>
    <div class="input-row">
      <input type="text" id="manual-input" placeholder="EGC26-0001"
        onkeydown="if(event.key==='Enter')doManualCheckin()" />
      <button class="btn-ci" onclick="doManualCheckin()">CHECK IN</button>
    </div>
  </div>
  <div id="manual-result-wrap"></div>
</div>

<!-- Log Panel -->
<div class="tab-panel" id="panel-log">
  <div id="log-list"><div class="log-empty">ยังไม่มีการ Check-in</div></div>
</div>

</div>

<script>
// ⚠️ แก้ URL นี้ให้ตรงกับ Apps Script Web App ของคุณ
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwdACAGtKFkfX9dQHFp9WQZ-Z8iAHGOcP8xkd6g763lNRN_Vf_7wRjq8su1fNRoKdOB4A/exec';

const stats  = { main: 0, ws1: 0, ws2: 0 };
let currentMode  = 'main';
let cameraOn     = false;
let videoStream  = null;
let scanCooldown = false;
let resultTimer  = null;

// ── Mode ─────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  ['main','ws1','ws2'].forEach(m => {
    document.getElementById('mode-' + m).classList.toggle('active', m === mode);
  });
  const labels = {
    main: '🎫 เข้างานหลัก',
    ws1:  '🎤 Workshop 1 — ภาคเช้า',
    ws2:  '🤖 Workshop 2 — ภาคบ่าย',
  };
  document.getElementById('mode-header').textContent = labels[mode];
  dismissResult();
}

// ── Tabs ─────────────────────────────────────────────────────
function switchTab(name) {
  ['scan','manual','log'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('panel-' + t).classList.toggle('active', t === name);
  });
  if (name !== 'scan' && cameraOn) stopCamera();
}

// ── Camera ───────────────────────────────────────────────────
async function toggleCamera() {
  if (cameraOn) { stopCamera(); return; }
  const hint = document.getElementById('scanner-hint');
  try {
    hint.textContent = 'กำลังเปิดกล้อง...';
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('scanner-video');
    video.srcObject = videoStream;
    await video.play();
    cameraOn = true;
    document.getElementById('btn-camera').textContent = '⏹ ปิดกล้อง';
    hint.textContent = 'กำลังสแกน... เล็ง QR Code ที่กรอบ';
    requestAnimationFrame(scanFrame);
  } catch (err) {
    hint.textContent = '❌ ไม่สามารถเปิดกล้องได้: ' + err.message;
  }
}

function stopCamera() {
  if (videoStream) videoStream.getTracks().forEach(t => t.stop());
  document.getElementById('scanner-video').srcObject = null;
  cameraOn = false;
  document.getElementById('btn-camera').textContent = '📷 เปิดกล้อง';
  document.getElementById('scanner-hint').textContent = 'กด "เปิดกล้อง" เพื่อเริ่มสแกน';
  dismissResult();
}

// ── Scan Loop ─────────────────────────────────────────────────
function scanFrame() {
  if (!cameraOn) return;
  const video  = document.getElementById('scanner-video');
  const canvas = document.getElementById('scanner-canvas');
  const ctx    = canvas.getContext('2d');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    if (code && !scanCooldown) {
      const match = code.data.match(/[?&]id=([A-Z0-9-]+)/i);
      if (match) {
        scanCooldown = true;
        doCheckIn(match[1].toUpperCase(), 'scan');
      }
    }
  }
  requestAnimationFrame(scanFrame);
}

// ── Check-in ─────────────────────────────────────────────────
function doManualCheckin() {
  const input = document.getElementById('manual-input');
  const tid   = input.value.trim().toUpperCase();
  if (!tid) return;
  input.value = '';
  doCheckIn(tid, 'manual');
}

async function doCheckIn(ticketId, source) {
  if (source === 'scan') {
    showOverlay('loading', ticketId);
  } else {
    document.getElementById('manual-result-wrap').innerHTML =
      '<div style="text-align:center;padding:20px"><div class="spinner"></div>' +
      '<div style="color:var(--muted);font-size:12px;font-family:var(--mono)">กำลังตรวจสอบ...</div></div>';
  }

  const actionMap = { main: 'checkin', ws1: 'ws1', ws2: 'ws2' };
  try {
    const res = await fetch(SCRIPT_URL + '?action=' + actionMap[currentMode] + '&id=' + encodeURIComponent(ticketId));
    const r   = await res.json();
    r.ticketId = ticketId;
    if (source === 'scan') {
      showOverlayResult(r);
      // auto dismiss หลัง 3 วิ แล้วสแกนต่อ
      clearTimeout(resultTimer);
      resultTimer = setTimeout(() => {
        dismissResult();
        scanCooldown = false;
      }, 3000);
    } else {
      renderManualResult(r);
      addLog(r);
      updateStats(r);
    }
    if (source === 'scan') { addLog(r); updateStats(r); }
  } catch (err) {
    const r = { type: 'error', ticketId, message: 'เชื่อมต่อไม่ได้' };
    if (source === 'scan') {
      showOverlayResult(r);
      clearTimeout(resultTimer);
      resultTimer = setTimeout(() => { dismissResult(); scanCooldown = false; }, 2000);
    } else {
      renderManualResult(r);
    }
  }
}

// ── Overlay (บนกล้อง) ────────────────────────────────────────
function showOverlay(type, ticketId) {
  document.getElementById('result-inner').innerHTML =
    '<div class="spinner"></div>' +
    '<div style="color:var(--muted);font-size:12px;font-family:var(--mono)">กำลังตรวจสอบ ' + ticketId + '...</div>';
  document.getElementById('result-overlay').classList.add('show');
}

function showOverlayResult(r) {
  const cfg = resultConfig(r);
  const wsTag  = r.wsMode ? `<div style="font-size:11px;color:var(--gold);margin:4px 0">${r.wsMode}</div>` : '';
  const dupTag = (r.type === 'duplicate' && r.checkTime)
    ? `<div class="result-time-text">สแกนครั้งแรก: ${r.checkTime}</div>` : '';

  document.getElementById('result-inner').className = `result-inner res-${r.type}`;
  document.getElementById('result-inner').innerHTML =
    `<span class="result-icon">${cfg.emoji}</span>
     <div class="result-status-text">${cfg.label}</div>
     <div class="result-name-text">${r.name || r.ticketId}</div>
     <div class="result-meta-text">${r.extra || r.message || ''}</div>
     ${wsTag}
     <div class="result-ticket-text">${r.ticketId}</div>
     ${dupTag}
     <div class="result-time-text">${r.time || ''}</div>
     <div style="margin-top:10px;font-size:10px;color:var(--muted);font-family:var(--mono)">แตะเพื่อสแกนต่อ</div>`;
  document.getElementById('result-overlay').classList.add('show');
}

function dismissResult() {
  document.getElementById('result-overlay').classList.remove('show');
  clearTimeout(resultTimer);
  scanCooldown = false;
}

// ── Manual Result ─────────────────────────────────────────────
function renderManualResult(r) {
  const cfg  = resultConfig(r);
  const wsTag  = r.wsMode ? `<div style="font-size:11px;color:var(--gold);margin:3px 0">${r.wsMode}</div>` : '';
  const dupTag = (r.type === 'duplicate' && r.checkTime)
    ? `<div class="mr-time">สแกนครั้งแรก: ${r.checkTime}</div>` : '';
  document.getElementById('manual-result-wrap').innerHTML =
    `<div class="manual-result ${r.type}">
      <div class="mr-icon">${cfg.emoji}</div>
      <div class="mr-status">${cfg.label}</div>
      <div class="mr-name">${r.name || r.ticketId}</div>
      <div class="mr-meta">${r.extra || r.message || ''}</div>
      ${wsTag}
      <div class="mr-ticket">${r.ticketId}</div>
      ${dupTag}
      <div class="mr-time">${r.time || ''}</div>
    </div>`;
}

function resultConfig(r) {
  return {
    success:   { emoji: '✅', label: 'เข้าสำเร็จ!' },
    duplicate: { emoji: '⚠️', label: 'สแกนซ้ำ!' },
    denied:    { emoji: '🚫', label: 'ไม่มีสิทธิ์เข้า Workshop!' },
    error:     { emoji: '❌', label: 'ไม่พบข้อมูล' },
  }[r.type] || { emoji: '❌', label: 'Error' };
}

// ── Log ──────────────────────────────────────────────────────
function addLog(r) {
  const list = document.getElementById('log-list');
  if (list.querySelector('.log-empty')) list.innerHTML = '';
  const labels = { success: 'เข้าสำเร็จ', duplicate: 'ซ้ำ', denied: 'ไม่มีสิทธิ์', error: 'ไม่พบ' };
  const modeTag = currentMode === 'ws1' ? ' · WS1' : currentMode === 'ws2' ? ' · WS2' : '';
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML =
    `<div class="log-dot ${r.type}"></div>
     <div class="log-info">
       <div class="log-name">${r.name || r.ticketId}</div>
       <div class="log-sub">${r.ticketId} · ${labels[r.type] || r.type}${modeTag}</div>
     </div>
     <div class="log-time">${r.time || new Date().toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>`;
  list.prepend(item);
}

// ── Stats ─────────────────────────────────────────────────────
function updateStats(r) {
  if (r.type !== 'success') return;
  if (currentMode === 'main') document.getElementById('stat-main').textContent = ++stats.main;
  if (currentMode === 'ws1')  document.getElementById('stat-ws1').textContent  = ++stats.ws1;
  if (currentMode === 'ws2')  document.getElementById('stat-ws2').textContent  = ++stats.ws2;
}
</script>
</body>
</html>
